<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Health Tracker</title>
    <link rel="stylesheet" href="/static/css/kiosk-touch.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            position: fixed;
            top: 0;
            left: 0;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        .header {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 16px 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-color: #4CAF50;
        }

        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .content-wrapper {
            display: flex;
            height: 100%;
            width: 200%;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .tab-pane {
            width: 50%;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #4CAF50;
        }

        .metric-label {
            font-size: 14px;
            opacity: 0.8;
        }

        .charts-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 1;
            min-height: 0;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }

        .period-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
        }

        .period-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .period-btn.active {
            background: #4CAF50;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 18px;
            opacity: 0.7;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* HRV Modal - Optimized for 7" touchscreen */
        .hrv-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .hrv-modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 16px;
            max-width: 320px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .hrv-modal-content h3 {
            text-align: center;
            color: white;
            margin: 0 0 12px 0;
            font-size: 20px;
        }
        
        .hrv-display {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        
        .hrv-display::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .hrv-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        
        .hrv-save-btn, .hrv-cancel-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 44px;
        }
        
        .hrv-save-btn {
            background: #4CAF50;
            color: white;
        }
        
        .hrv-save-btn:hover {
            background: #45a049;
        }
        
        .hrv-cancel-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .hrv-cancel-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Screensaver Mode */
        .screensaver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .screensaver.active {
            opacity: 1;
        }

        .screensaver-content {
            text-align: center;
            color: white;
            max-width: 90%;
            animation: fadeIn 2s ease-in-out;
        }

        .screensaver-metric {
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .screensaver-metric.visible {
            opacity: 1;
        }

        .metric-title {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 2px;
        }

        .metric-display {
            margin-bottom: 1.5rem;
        }

        .current-value {
            font-size: 3.5rem;
            font-weight: bold;
            line-height: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .metric-unit {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
        }

        .progress-chart {
            margin: 1.5rem 0;
            display: flex;
            justify-content: center;
        }

        .progress-chart canvas {
            max-width: 90%;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
        }

        .motivation-text {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .progress-indicator {
            font-size: 1.8rem;
            font-weight: 600;
            color: #4CAF50;
        }

        .progress-indicator.negative {
            color: #FF6B6B;
        }

        .progress-indicator.neutral {
            color: #FFD93D;
        }

        .zone-indicator {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Custom Numpad Styles - Compact for 7" screen */
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        
        .numpad-btn {
            padding: 12px;
            font-size: 20px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .numpad-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        
        .numpad-btn:active {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0.95);
        }
        
        .numpad-btn.clear-btn {
            background: rgba(255, 59, 48, 0.3);
            font-size: 14px;
        }
        
        .numpad-btn.clear-btn:hover {
            background: rgba(255, 59, 48, 0.4);
        }
        
        .numpad-btn.backspace-btn {
            background: rgba(255, 149, 0, 0.3);
            font-size: 18px;
        }
        
        .numpad-btn.backspace-btn:hover {
            background: rgba(255, 149, 0, 0.4);
        }


        /* Swipe indicator */
        .swipe-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Health Tracker</h1>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="today">Today</button>
            <button class="tab" data-tab="charts">Charts</button>
        </nav>

        <main class="content" id="content">
            <div class="content-wrapper" id="contentWrapper">
                <!-- Today Tab -->
                <div class="tab-pane" id="today">
                    <div class="metrics-grid" id="metricsGrid">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading...
                        </div>
                    </div>
                </div>
                
                <!-- Screensaver Mode -->
                <div id="screensaver" class="screensaver" style="display: none;">
                    <div class="screensaver-content">
                        <div id="screensaver-metric" class="screensaver-metric">
                            <div class="metric-title">Steps Progress</div>
                            <div class="metric-display">
                                <div class="current-value">8,247</div>
                                <div class="metric-unit">steps today</div>
                            </div>
                            <div class="progress-chart">
                                <canvas id="screensaver-chart" width="400" height="200"></canvas>
                            </div>
                            <div class="motivation-text">
                                <div class="progress-indicator">↗ +12% vs last week</div>
                                <div class="zone-indicator">Above target zone</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- HRV Entry Modal -->
                <div id="hrvModal" class="hrv-modal" style="display: none;">
                    <div class="hrv-modal-content">
                        <h3>Enter Today's HRV</h3>
                        <input 
                            type="text" 
                            class="hrv-display" 
                            id="hrvInput" 
                            placeholder="0"
                            readonly
                        >
                        <div class="numpad-grid">
                            <button class="numpad-btn" onclick="addDigit('1')">1</button>
                            <button class="numpad-btn" onclick="addDigit('2')">2</button>
                            <button class="numpad-btn" onclick="addDigit('3')">3</button>
                            <button class="numpad-btn" onclick="addDigit('4')">4</button>
                            <button class="numpad-btn" onclick="addDigit('5')">5</button>
                            <button class="numpad-btn" onclick="addDigit('6')">6</button>
                            <button class="numpad-btn" onclick="addDigit('7')">7</button>
                            <button class="numpad-btn" onclick="addDigit('8')">8</button>
                            <button class="numpad-btn" onclick="addDigit('9')">9</button>
                            <button class="numpad-btn clear-btn" onclick="clearInput()">Clear</button>
                            <button class="numpad-btn" onclick="addDigit('0')">0</button>
                            <button class="numpad-btn backspace-btn" onclick="backspace()">⌫</button>
                        </div>
                        <div class="hrv-actions">
                            <button class="hrv-save-btn" onclick="submitHRV()">Save</button>
                            <button class="hrv-cancel-btn" onclick="closeHRVModal()">Cancel</button>
                        </div>
                    </div>
                </div>

                <!-- Charts Tab -->
                <div class="tab-pane" id="charts">
                    <div class="period-controls">
                        <button class="period-btn active" data-period="daily">Daily</button>
                        <button class="period-btn" data-period="weekly">Weekly</button>
                        <button class="period-btn" data-period="monthly">Monthly</button>
                    </div>
                    
                    <div class="charts-container" id="chartsContainer">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading charts...
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="swipe-indicator">◀ Swipe left/right to navigate ▶</div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    
    <script>
        let currentTab = 0;
        let currentPeriod = 'daily';
        let charts = {};
        
        const wrapper = document.getElementById('contentWrapper');
        const content = document.getElementById('content');
        
        // Initialize Hammer.js
        const hammer = new Hammer(content);
        
        // Configure swipe recognition
        hammer.get('swipe').set({ 
            direction: Hammer.DIRECTION_HORIZONTAL,
            threshold: 10,
            velocity: 0.1
        });
        
        // Configure pan recognition for smoother dragging
        hammer.get('pan').set({ 
            direction: Hammer.DIRECTION_HORIZONTAL,
            threshold: 10
        });
        
        let isPanning = false;
        let startTransform = 0;
        
        // Pan events for live dragging
        hammer.on('panstart', function(e) {
            isPanning = true;
            startTransform = getCurrentTransform();
            wrapper.style.transition = 'none';
            console.log('Pan start:', e.deltaX);
        });
        
        hammer.on('panmove', function(e) {
            if (!isPanning) return;
            
            let newTransform = startTransform + (e.deltaX / window.innerWidth) * 100;
            
            // Constrain bounds
            newTransform = Math.max(-50, Math.min(0, newTransform));
            
            wrapper.style.transform = `translateX(${newTransform}%)`;
            console.log('Pan move:', e.deltaX, 'Transform:', newTransform);
        });
        
        hammer.on('panend', function(e) {
            if (!isPanning) return;
            isPanning = false;
            
            wrapper.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
            
            // Determine which tab to snap to
            const threshold = 25; // 25% of screen width
            const currentTransform = getCurrentTransform();
            
            if (currentTransform < -threshold) {
                switchToTab(1);
            } else {
                switchToTab(0);
            }
            
            console.log('Pan end, snapping to tab:', currentTransform < -threshold ? 1 : 0);
        });
        
        // Swipe events for quick gestures
        hammer.on('swipeleft', function(e) {
            console.log('Swipe left detected');
            switchToTab(1);
        });
        
        hammer.on('swiperight', function(e) {
            console.log('Swipe right detected');
            switchToTab(0);
        });
        
        function getCurrentTransform() {
            const style = window.getComputedStyle(wrapper);
            const matrix = style.transform;
            
            if (matrix === 'none' || !matrix) return 0;
            
            const values = matrix.match(/matrix.*\((.+)\)/)[1].split(', ');
            const translateX = parseFloat(values[4]) || 0;
            
            return (translateX / window.innerWidth) * 100;
        }
        
        // Tab switching
        function switchToTab(index) {
            if (index === currentTab) return;
            
            currentTab = index;
            
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });
            
            const translateX = index === 0 ? 0 : -50;
            wrapper.style.transform = `translateX(${translateX}%)`;
            
            console.log('Switched to tab:', index);
            
            if (index === 1) {
                loadCharts(currentPeriod);
            } else {
                loadTodayData();
            }
        }
        
        // Tab click handlers
        document.querySelectorAll('.tab').forEach((tab, index) => {
            tab.addEventListener('click', () => {
                console.log('Tab clicked:', index);
                switchToTab(index);
            });
        });
        
        // Period controls
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPeriod = btn.dataset.period;
                loadCharts(currentPeriod);
            });
        });
        
        // Data loading functions
        async function loadTodayData() {
            try {
                const response = await fetch('/api/ui/today');
                const html = await response.text();
                document.getElementById('metricsGrid').innerHTML = html;
            } catch (error) {
                console.error('Error loading today data:', error);
                document.getElementById('metricsGrid').innerHTML = '<div style="color: #ff6b6b; text-align: center;">Error loading data</div>';
            }
        }
        
        async function loadCharts(period) {
            const container = document.getElementById('chartsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading charts...</div>';
            
            try {
                const response = await fetch(`/api/ui/charts?period=${period}`);
                const html = await response.text();
                container.innerHTML = html;
                
                // Initialize charts after DOM update
                setTimeout(initializeCharts, 100);
            } catch (error) {
                console.error('Error loading charts:', error);
                container.innerHTML = '<div style="color: #ff6b6b; text-align: center;">Error loading charts</div>';
            }
        }
        
        function initializeCharts() {
            console.log('Charts initialized for period:', currentPeriod);
        }
        
        // Open HRV Modal
        function openHRVModal() {
            document.getElementById('hrvModal').style.display = 'flex';
            document.getElementById('hrvInput').value = '';
        }
        
        // Close HRV Modal
        function closeHRVModal() {
            document.getElementById('hrvModal').style.display = 'none';
            document.getElementById('hrvInput').value = '';
        }
        
        // Add digit to HRV input
        function addDigit(digit) {
            const input = document.getElementById('hrvInput');
            const currentValue = input.value;
            
            // Limit to 3 digits (max HRV is usually under 200)
            if (currentValue.length < 3) {
                input.value = currentValue + digit;
            }
        }
        
        // Clear HRV input
        function clearInput() {
            document.getElementById('hrvInput').value = '';
        }
        
        // Backspace function
        function backspace() {
            const input = document.getElementById('hrvInput');
            input.value = input.value.slice(0, -1);
        }
        
        // HRV submission
        async function submitHRV() {
            const input = document.getElementById('hrvInput');
            const value = parseFloat(input.value);
            
            if (isNaN(value) || value < 1 || value > 200) {
                alert('Please enter a valid HRV value between 1 and 200 ms');
                return;
            }
            
            try {
                const response = await fetch('/api/manual', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        metric: 'hrv',
                        value: value,
                        unit: 'ms',
                        date: new Date().toISOString().split('T')[0]
                    })
                });
                
                if (response.ok) {
                    closeHRVModal();
                    loadTodayData(); // Refresh today's data to show new HRV value
                } else {
                    alert('Error saving HRV. Please try again.');
                }
            } catch (error) {
                console.error('Error submitting HRV:', error);
                alert('Error saving HRV. Please try again.');
            }
        }
        
        // Initialize app
        // Screensaver functionality
        let screensaverTimeout;
        let screensaverActive = false;
        let currentMetricIndex = 0;
        const screensaverDelay = 30000; // 30 seconds of inactivity
        const metricCycleTime = 15000; // 15 seconds per metric

        const metrics = [
            {
                name: 'Steps Progress',
                color: '#4CAF50',
                icon: '👟',
                unit: 'steps today',
                target: 8000,
                optimalZone: 'Above target'
            },
            {
                name: 'Weight Trend',
                color: '#FF9800', 
                icon: '⚖️',
                unit: 'lbs',
                target: 165,
                optimalZone: 'In healthy range'
            },
            {
                name: 'Heart Rate',
                color: '#F44336',
                icon: '❤️',
                unit: 'bpm resting',
                target: 65,
                optimalZone: 'Optimal zone'
            },
            {
                name: 'HRV Recovery',
                color: '#9C27B0',
                icon: '💓',
                unit: 'ms',
                target: 45,
                optimalZone: 'Recovery ready'
            }
        ];

        function resetScreensaverTimer() {
            clearTimeout(screensaverTimeout);
            if (screensaverActive) {
                exitScreensaver();
            }
            screensaverTimeout = setTimeout(enterScreensaver, screensaverDelay);
        }

        function enterScreensaver() {
            screensaverActive = true;
            currentMetricIndex = 0;
            document.getElementById('screensaver').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('screensaver').classList.add('active');
                showMetric(0);
                startMetricCycle();
            }, 100);
        }

        function exitScreensaver() {
            screensaverActive = false;
            document.getElementById('screensaver').classList.remove('active');
            setTimeout(() => {
                document.getElementById('screensaver').style.display = 'none';
            }, 1000);
            clearInterval(window.metricCycleInterval);
        }

        function showMetric(index) {
            const metric = metrics[index];
            const metricElement = document.getElementById('screensaver-metric');
            
            // Fade out
            metricElement.classList.remove('visible');
            
            setTimeout(() => {
                // Update content
                metricElement.innerHTML = `
                    <div class="metric-title">${metric.name}</div>
                    <div class="metric-display">
                        <div class="current-value">${generateMockValue(metric)}</div>
                        <div class="metric-unit">${metric.unit}</div>
                    </div>
                    <div class="progress-chart">
                        <canvas id="screensaver-chart" width="500" height="220"></canvas>
                    </div>
                    <div class="motivation-text">
                        <div class="progress-indicator">${generateProgressText(metric)}</div>
                        <div class="zone-indicator">${metric.optimalZone}</div>
                    </div>
                `;
                
                // Draw chart
                drawMetricChart(metric, index);
                
                // Fade in
                metricElement.classList.add('visible');
            }, 750);
        }

        function generateMockValue(metric) {
            // Generate realistic current values
            switch (metric.name) {
                case 'Steps Progress': return '8,247';
                case 'Weight Trend': return '167.2';
                case 'Heart Rate': return '62';
                case 'HRV Recovery': return '48';
                default: return '---';
            }
        }

        function generateProgressText(metric) {
            const progressTexts = [
                '↗ +12% vs last week',
                '↘ -2.1 lbs this month',
                '↗ Improving recovery', 
                '↗ +8% higher than average'
            ];
            return progressTexts[Math.floor(Math.random() * progressTexts.length)];
        }

        function drawMetricChart(metric, index) {
            const canvas = document.getElementById('screensaver-chart');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Chart area with margins for labels
            const margin = 40;
            const chartWidth = canvas.width - (margin * 2);
            const chartHeight = canvas.height - (margin * 2);
            const chartX = margin;
            const chartY = margin;
            
            // Generate mock trend data
            const dataPoints = generateTrendData(metric, 7); // 7 days for better visibility
            const maxY = Math.max(...dataPoints);
            const minY = Math.min(...dataPoints);
            const range = maxY - minY;
            
            // Ensure some range for flat data
            const adjustedMax = range < 1 ? maxY + 1 : maxY;
            const adjustedMin = range < 1 ? minY - 1 : minY;
            const adjustedRange = adjustedMax - adjustedMin;
            
            // Draw grid lines and Y-axis labels
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.font = '14px Arial';
            ctx.textAlign = 'right';
            
            for (let i = 0; i <= 4; i++) {
                const y = chartY + (chartHeight / 4) * i;
                const value = adjustedMax - (adjustedRange / 4) * i;
                
                // Grid line
                ctx.beginPath();
                ctx.moveTo(chartX, y);
                ctx.lineTo(chartX + chartWidth, y);
                ctx.stroke();
                
                // Y-axis label
                ctx.fillText(Math.round(value), chartX - 10, y + 5);
            }
            
            // Draw X-axis labels (days)
            ctx.textAlign = 'center';
            const days = ['7d', '6d', '5d', '4d', '3d', '2d', 'Today'];
            dataPoints.forEach((point, i) => {
                const x = chartX + (chartWidth / (dataPoints.length - 1)) * i;
                ctx.fillText(days[i] || `${7-i}d`, x, chartY + chartHeight + 25);
            });
            
            // Draw trend line
            ctx.strokeStyle = metric.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            dataPoints.forEach((point, i) => {
                const x = chartX + (chartWidth / (dataPoints.length - 1)) * i;
                const y = chartY + chartHeight - ((point - adjustedMin) / adjustedRange) * chartHeight;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
            
            // Draw data points with values
            ctx.fillStyle = metric.color;
            ctx.textAlign = 'center';
            ctx.font = '12px Arial';
            
            dataPoints.forEach((point, i) => {
                const x = chartX + (chartWidth / (dataPoints.length - 1)) * i;
                const y = chartY + chartHeight - ((point - adjustedMin) / adjustedRange) * chartHeight;
                
                // Data point circle
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // Value label above point
                ctx.fillStyle = 'white';
                ctx.fillText(Math.round(point), x, y - 10);
                ctx.fillStyle = metric.color;
            });
            
            // Draw chart border
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(chartX, chartY, chartWidth, chartHeight);
        }

        function generateTrendData(metric, days) {
            const data = [];
            let baseValue;
            
            switch (metric.name) {
                case 'Steps Progress':
                    baseValue = 7500;
                    for (let i = 0; i < days; i++) {
                        data.push(baseValue + Math.random() * 3000 - 500 + (i * 50)); // Upward trend
                    }
                    break;
                case 'Weight Trend':
                    baseValue = 170;
                    for (let i = 0; i < days; i++) {
                        data.push(baseValue - (i * 0.2) + (Math.random() - 0.5)); // Downward trend
                    }
                    break;
                case 'Heart Rate':
                    baseValue = 68;
                    for (let i = 0; i < days; i++) {
                        data.push(baseValue - (i * 0.3) + Math.random() * 4 - 2); // Slight downward
                    }
                    break;
                case 'HRV Recovery':
                    baseValue = 42;
                    for (let i = 0; i < days; i++) {
                        data.push(baseValue + (i * 0.4) + Math.random() * 6 - 3); // Upward trend
                    }
                    break;
            }
            return data;
        }

        function startMetricCycle() {
            window.metricCycleInterval = setInterval(() => {
                if (screensaverActive) {
                    currentMetricIndex = (currentMetricIndex + 1) % metrics.length;
                    showMetric(currentMetricIndex);
                }
            }, metricCycleTime);
        }

        // Event listeners to reset screensaver timer
        ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'].forEach(event => {
            document.addEventListener(event, resetScreensaverTimer, true);
        });

        // Click anywhere on screensaver to exit
        document.getElementById('screensaver').addEventListener('click', exitScreensaver);

        document.addEventListener('DOMContentLoaded', () => {
            console.log('App initialized with Hammer.js and Screensaver');
            loadTodayData();
            resetScreensaverTimer(); // Start screensaver timer
        });
        
        // Debug touch events
        content.addEventListener('touchstart', (e) => {
            console.log('Touch start:', e.touches.length, 'touches');
        });
        
        content.addEventListener('touchmove', (e) => {
            console.log('Touch move');
        });
        
        content.addEventListener('touchend', (e) => {
            console.log('Touch end');
        });
    </script>
