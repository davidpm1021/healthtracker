<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Health Tracker</title>
    <link rel="stylesheet" href="/static/css/kiosk-touch.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            position: fixed;
            top: 0;
            left: 0;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        .header {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 16px 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-color: #4CAF50;
        }

        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .content-wrapper {
            display: flex;
            height: 100%;
            width: 200%;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .tab-pane {
            width: 50%;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #4CAF50;
        }

        .metric-label {
            font-size: 14px;
            opacity: 0.8;
        }

        .charts-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 1;
            min-height: 0;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }

        .period-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
        }

        .period-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .period-btn.active {
            background: #4CAF50;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 18px;
            opacity: 0.7;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* HRV Entry */
        .hrv-entry {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-top: auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .hrv-entry h3:hover {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        
        #hrvToggleIcon {
            font-size: 0.8em;
            margin-left: 8px;
            transition: transform 0.2s ease;
        }

        .hrv-input {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 18px;
            text-align: center;
            margin: 12px 0;
        }

        .hrv-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .hrv-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .hrv-btn:hover {
            background: #45a049;
        }

        /* Swipe indicator */
        .swipe-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Health Tracker</h1>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="today">Today</button>
            <button class="tab" data-tab="charts">Charts</button>
        </nav>

        <main class="content" id="content">
            <div class="content-wrapper" id="contentWrapper">
                <!-- Today Tab -->
                <div class="tab-pane" id="today">
                    <div class="metrics-grid" id="metricsGrid">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading...
                        </div>
                    </div>
                    
                    <div class="hrv-entry" id="hrvEntryBox">
                        <h3 style="text-align: center; margin-bottom: 16px; cursor: pointer;" onclick="toggleHRVInput()">
                            Enter HRV <span id="hrvToggleIcon">▶</span>
                        </h3>
                        <div id="hrvInputContainer" style="display: none;">
                            <input 
                                type="number" 
                                class="hrv-input" 
                                id="hrvInput" 
                                placeholder="Enter HRV value (ms)"
                                min="1"
                                max="200"
                                inputmode="numeric"
                                pattern="[0-9]*"
                            >
                            <button class="hrv-btn" onclick="submitHRV()">Save HRV</button>
                        </div>
                    </div>
                </div>

                <!-- Charts Tab -->
                <div class="tab-pane" id="charts">
                    <div class="period-controls">
                        <button class="period-btn active" data-period="daily">Daily</button>
                        <button class="period-btn" data-period="weekly">Weekly</button>
                        <button class="period-btn" data-period="monthly">Monthly</button>
                    </div>
                    
                    <div class="charts-container" id="chartsContainer">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading charts...
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="swipe-indicator">◀ Swipe left/right to navigate ▶</div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    
    <script>
        let currentTab = 0;
        let currentPeriod = 'daily';
        let charts = {};
        
        const wrapper = document.getElementById('contentWrapper');
        const content = document.getElementById('content');
        
        // Initialize Hammer.js
        const hammer = new Hammer(content);
        
        // Configure swipe recognition
        hammer.get('swipe').set({ 
            direction: Hammer.DIRECTION_HORIZONTAL,
            threshold: 10,
            velocity: 0.1
        });
        
        // Configure pan recognition for smoother dragging
        hammer.get('pan').set({ 
            direction: Hammer.DIRECTION_HORIZONTAL,
            threshold: 10
        });
        
        let isPanning = false;
        let startTransform = 0;
        
        // Pan events for live dragging
        hammer.on('panstart', function(e) {
            isPanning = true;
            startTransform = getCurrentTransform();
            wrapper.style.transition = 'none';
            console.log('Pan start:', e.deltaX);
        });
        
        hammer.on('panmove', function(e) {
            if (!isPanning) return;
            
            let newTransform = startTransform + (e.deltaX / window.innerWidth) * 100;
            
            // Constrain bounds
            newTransform = Math.max(-50, Math.min(0, newTransform));
            
            wrapper.style.transform = `translateX(${newTransform}%)`;
            console.log('Pan move:', e.deltaX, 'Transform:', newTransform);
        });
        
        hammer.on('panend', function(e) {
            if (!isPanning) return;
            isPanning = false;
            
            wrapper.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
            
            // Determine which tab to snap to
            const threshold = 25; // 25% of screen width
            const currentTransform = getCurrentTransform();
            
            if (currentTransform < -threshold) {
                switchToTab(1);
            } else {
                switchToTab(0);
            }
            
            console.log('Pan end, snapping to tab:', currentTransform < -threshold ? 1 : 0);
        });
        
        // Swipe events for quick gestures
        hammer.on('swipeleft', function(e) {
            console.log('Swipe left detected');
            switchToTab(1);
        });
        
        hammer.on('swiperight', function(e) {
            console.log('Swipe right detected');
            switchToTab(0);
        });
        
        function getCurrentTransform() {
            const style = window.getComputedStyle(wrapper);
            const matrix = style.transform;
            
            if (matrix === 'none' || !matrix) return 0;
            
            const values = matrix.match(/matrix.*\((.+)\)/)[1].split(', ');
            const translateX = parseFloat(values[4]) || 0;
            
            return (translateX / window.innerWidth) * 100;
        }
        
        // Tab switching
        function switchToTab(index) {
            if (index === currentTab) return;
            
            currentTab = index;
            
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });
            
            const translateX = index === 0 ? 0 : -50;
            wrapper.style.transform = `translateX(${translateX}%)`;
            
            console.log('Switched to tab:', index);
            
            if (index === 1) {
                loadCharts(currentPeriod);
            } else {
                loadTodayData();
            }
        }
        
        // Tab click handlers
        document.querySelectorAll('.tab').forEach((tab, index) => {
            tab.addEventListener('click', () => {
                console.log('Tab clicked:', index);
                switchToTab(index);
            });
        });
        
        // Period controls
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPeriod = btn.dataset.period;
                loadCharts(currentPeriod);
            });
        });
        
        // Data loading functions
        async function loadTodayData() {
            try {
                const response = await fetch('/api/ui/today');
                const html = await response.text();
                document.getElementById('metricsGrid').innerHTML = html;
            } catch (error) {
                console.error('Error loading today data:', error);
                document.getElementById('metricsGrid').innerHTML = '<div style="color: #ff6b6b; text-align: center;">Error loading data</div>';
            }
        }
        
        async function loadCharts(period) {
            const container = document.getElementById('chartsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading charts...</div>';
            
            try {
                const response = await fetch(`/api/ui/charts?period=${period}`);
                const html = await response.text();
                container.innerHTML = html;
                
                // Initialize charts after DOM update
                setTimeout(initializeCharts, 100);
            } catch (error) {
                console.error('Error loading charts:', error);
                container.innerHTML = '<div style="color: #ff6b6b; text-align: center;">Error loading charts</div>';
            }
        }
        
        function initializeCharts() {
            console.log('Charts initialized for period:', currentPeriod);
        }
        
        // Toggle HRV input visibility
        function toggleHRVInput() {
            const container = document.getElementById('hrvInputContainer');
            const icon = document.getElementById('hrvToggleIcon');
            
            if (container.style.display === 'none') {
                container.style.display = 'block';
                icon.textContent = '▼';
                // Focus on input when opened
                document.getElementById('hrvInput').focus();
            } else {
                container.style.display = 'none';
                icon.textContent = '▶';
            }
        }
        
        // HRV submission
        async function submitHRV() {
            const input = document.getElementById('hrvInput');
            const value = parseFloat(input.value);
            
            if (isNaN(value) || value < 1 || value > 200) {
                alert('Please enter a valid HRV value between 1 and 200 ms');
                return;
            }
            
            try {
                const response = await fetch('/api/manual', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        metric: 'hrv',
                        value: value,
                        unit: 'ms',
                        date: new Date().toISOString().split('T')[0]
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    // Hide the input container after successful save
                    document.getElementById('hrvInputContainer').style.display = 'none';
                    document.getElementById('hrvToggleIcon').textContent = '▶';
                    alert('HRV saved successfully!');
                    loadTodayData(); // Refresh today's data
                } else {
                    alert('Error saving HRV. Please try again.');
                }
            } catch (error) {
                console.error('Error submitting HRV:', error);
                alert('Error saving HRV. Please try again.');
            }
        }
        
        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            console.log('App initialized with Hammer.js');
            loadTodayData();
        });
        
        // Debug touch events
        content.addEventListener('touchstart', (e) => {
            console.log('Touch start:', e.touches.length, 'touches');
        });
        
        content.addEventListener('touchmove', (e) => {
            console.log('Touch move');
        });
        
        content.addEventListener('touchend', (e) => {
            console.log('Touch end');
        });
    </script>
</body>
</html>
