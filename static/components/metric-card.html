<!-- Metric Card Component Template -->
<!-- This template is used by the UI API to generate metric cards -->

<div class="metric-card" data-metric="{metric_type}">
    <div class="metric-header">
        <div class="metric-icon-container">
            <div class="metric-icon {metric_class}">{metric_icon}</div>
            <div class="metric-status {status_class}"></div>
        </div>
        <div class="metric-info">
            <div class="metric-name">{metric_name}</div>
            <div class="metric-timestamp">{last_updated}</div>
        </div>
    </div>
    
    <div class="metric-body">
        <div class="metric-value-container">
            <div class="metric-value">{value}</div>
            <div class="metric-unit">{unit}</div>
        </div>
        
        {trend_indicator}
        
        {comparison_text}
    </div>
    
    <div class="metric-footer">
        {action_buttons}
        
        <div class="metric-progress" style="display: {progress_display};">
            <div class="progress-bar">
                <div class="progress-fill" style="width: {progress_percent}%;"></div>
            </div>
            <div class="progress-text">{progress_text}</div>
        </div>
    </div>
</div>

<!-- CSS for enhanced metric cards -->
<style>
.metric-card {
    background: var(--bg-primary);
    border-radius: var(--border-radius-large);
    padding: var(--spacing-lg);
    box-shadow: var(--shadow-medium);
    transition: var(--transition);
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
}

.metric-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: var(--primary-color);
    opacity: 0;
    transition: var(--transition);
}

.metric-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-heavy);
}

.metric-card:hover::before {
    opacity: 1;
}

.metric-card[data-metric="steps"]::before { background: #667eea; }
.metric-card[data-metric="sleep"]::before { background: #764ba2; }
.metric-card[data-metric="weight"]::before { background: #42b883; }
.metric-card[data-metric="heart_rate"]::before { background: #e74c3c; }
.metric-card[data-metric="hrv"]::before { background: #f39c12; }
.metric-card[data-metric="mood"]::before { background: #9b59b6; }
.metric-card[data-metric="energy"]::before { background: #e67e22; }

.metric-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: var(--spacing-md);
}

.metric-icon-container {
    position: relative;
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
}

.metric-icon {
    font-size: 2rem;
    width: 56px;
    height: 56px;
    border-radius: var(--border-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-secondary);
    transition: var(--transition);
}

.metric-icon.steps { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
.metric-icon.sleep { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); color: white; }
.metric-icon.weight { background: linear-gradient(135deg, #42b883 0%, #27ae60 100%); color: white; }
.metric-icon.heart_rate { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: white; }
.metric-icon.hrv { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); color: white; }
.metric-icon.mood { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); color: white; }
.metric-icon.energy { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); color: white; }

.metric-status {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid var(--bg-primary);
    position: absolute;
    top: -2px;
    right: -2px;
}

.metric-status.fresh { background: var(--success-color); }
.metric-status.stale { background: var(--warning-color); }
.metric-status.missing { background: var(--text-secondary); }

.metric-info {
    flex: 1;
    text-align: right;
}

.metric-name {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: var(--spacing-xs);
}

.metric-timestamp {
    font-size: 0.75rem;
    color: var(--text-secondary);
    opacity: 0.8;
}

.metric-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    margin: var(--spacing-md) 0;
}

.metric-value-container {
    display: flex;
    align-items: baseline;
    gap: var(--spacing-sm);
    margin-bottom: var(--spacing-sm);
}

.metric-value {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
}

.metric-value.large {
    font-size: 3rem;
}

.metric-value.small {
    font-size: 2rem;
}

.metric-unit {
    font-size: 1rem;
    color: var(--text-secondary);
    font-weight: 500;
}

.metric-trend {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    font-size: 0.875rem;
    margin-bottom: var(--spacing-xs);
}

.trend-arrow {
    font-size: 1.125rem;
    font-weight: bold;
}

.trend-up { color: var(--success-color); }
.trend-down { color: var(--danger-color); }
.trend-flat { color: var(--text-secondary); }

.metric-comparison {
    font-size: 0.75rem;
    color: var(--text-secondary);
    line-height: 1.3;
}

.metric-footer {
    margin-top: auto;
}

.metric-actions {
    display: flex;
    gap: var(--spacing-xs);
    margin-bottom: var(--spacing-sm);
}

.metric-action-btn {
    padding: var(--spacing-xs) var(--spacing-sm);
    background: var(--bg-secondary);
    border: none;
    border-radius: var(--border-radius);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    transition: var(--transition);
    min-height: var(--touch-target-min);
}

.metric-action-btn:hover {
    background: var(--primary-color);
    color: var(--text-light);
}

.metric-action-btn.primary {
    background: var(--primary-color);
    color: var(--text-light);
}

.metric-progress {
    margin-top: var(--spacing-sm);
}

.progress-bar {
    width: 100%;
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: var(--spacing-xs);
}

.progress-fill {
    height: 100%;
    background: var(--primary-color);
    border-radius: 3px;
    transition: width 0.5s ease;
    position: relative;
    overflow: hidden;
}

.progress-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s infinite;
}

@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.progress-text {
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-align: center;
}

/* Manual Entry Specific Styles */
.metric-card.manual-entry {
    border: 2px dashed var(--border-color);
    background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
}

.metric-card.manual-entry:hover {
    border-color: var(--primary-color);
    background: var(--bg-primary);
}

.manual-entry-prompt {
    text-align: center;
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin: var(--spacing-md) 0;
}

.manual-entry-btn {
    width: 100%;
    padding: var(--spacing-md);
    background: var(--primary-color);
    color: var(--text-light);
    border: none;
    border-radius: var(--border-radius);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    min-height: var(--touch-target-min);
}

.manual-entry-btn:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
}

.manual-entry-btn:active {
    transform: translateY(0);
}

/* Loading State */
.metric-card.loading {
    opacity: 0.6;
    pointer-events: none;
}

.metric-card.loading .metric-value {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: loading-shimmer 1.5s infinite;
    border-radius: 4px;
    color: transparent;
}

@keyframes loading-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* Error State */
.metric-card.error {
    border-left: 4px solid var(--danger-color);
    background: rgba(231, 76, 60, 0.05);
}

.metric-card.error .metric-value {
    color: var(--danger-color);
}

/* Mobile Adjustments */
@media (max-width: 800px) {
    .metric-card {
        min-height: 140px;
        padding: var(--spacing-md);
    }
    
    .metric-icon {
        width: 48px;
        height: 48px;
        font-size: 1.75rem;
    }
    
    .metric-value {
        font-size: 2rem;
    }
    
    .metric-value.large {
        font-size: 2.25rem;
    }
}
</style>
