<!-- Today View Component Template -->
<!-- This template defines the complete Today view layout -->

<div class="today-view-container">
    
    <!-- Sync Status Banner -->
    <div class="sync-banner" x-data="syncBanner()" x-init="checkSyncStatus()">
        <div class="sync-info">
            <div class="sync-icon" :class="syncStatusClass">
                <span x-text="syncIcon"></span>
            </div>
            <div class="sync-details">
                <div class="sync-text" x-text="syncMessage"></div>
                <div class="sync-time" x-text="lastSyncTime"></div>
            </div>
        </div>
        <button 
            class="sync-refresh-btn" 
            @click="refreshData()"
            :disabled="isRefreshing"
            type="button"
        >
            <span x-show="!isRefreshing">🔄</span>
            <span x-show="isRefreshing" class="spinning">⟳</span>
        </button>
    </div>

    <!-- Quick Stats Summary -->
    <div class="quick-stats">
        <div class="stat-item">
            <div class="stat-value" x-text="$store.todayStats.totalMetrics || 0"></div>
            <div class="stat-label">Metrics</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" x-text="$store.todayStats.completedGoals || 0"></div>
            <div class="stat-label">Goals Met</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" x-text="$store.todayStats.streakDays || 0"></div>
            <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" x-text="$store.todayStats.healthScore || '--'"></div>
            <div class="stat-label">Health Score</div>
        </div>
    </div>

    <!-- Primary Metrics Grid -->
    <div class="primary-metrics-grid">
        <!-- This will be populated by HTMX -->
        <div 
            id="primary-metrics" 
            hx-get="/api/ui/today/primary"
            hx-trigger="load, every 30s"
            hx-swap="innerHTML"
            hx-indicator="#primary-loading"
        >
            <!-- Loading placeholder -->
            <div id="primary-loading" class="loading-grid">
                <div class="loading-card">
                    <div class="loading-spinner"></div>
                    <p>Loading primary metrics...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Secondary Metrics Grid -->
    <div class="secondary-metrics-grid">
        <!-- This will be populated by HTMX -->
        <div 
            id="secondary-metrics" 
            hx-get="/api/ui/today/secondary"
            hx-trigger="load, every 60s"
            hx-swap="innerHTML"
            hx-indicator="#secondary-loading"
        >
            <!-- Loading placeholder -->
            <div id="secondary-loading" class="loading-grid">
                <div class="loading-card">
                    <div class="loading-spinner"></div>
                    <p>Loading secondary metrics...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Manual Entry Section -->
    <div class="manual-entry-section">
        <div class="section-header">
            <h3>Quick Entry</h3>
            <div class="section-subtitle">Tap to add manual data</div>
        </div>
        
        <div class="manual-entry-grid">
            <!-- HRV Entry -->
            <div class="manual-entry-card" @click="showManualEntry('hrv')">
                <div class="entry-icon hrv-icon">💓</div>
                <div class="entry-content">
                    <div class="entry-name">HRV</div>
                    <div class="entry-status" x-text="$store.manualEntryStatus.hrv"></div>
                </div>
                <div class="entry-arrow">›</div>
            </div>

            <!-- Mood Entry -->
            <div class="manual-entry-card" @click="showManualEntry('mood')">
                <div class="entry-icon mood-icon">😊</div>
                <div class="entry-content">
                    <div class="entry-name">Mood</div>
                    <div class="entry-status" x-text="$store.manualEntryStatus.mood"></div>
                </div>
                <div class="entry-arrow">›</div>
            </div>

            <!-- Energy Entry -->
            <div class="manual-entry-card" @click="showManualEntry('energy')">
                <div class="entry-icon energy-icon">⚡</div>
                <div class="entry-content">
                    <div class="entry-name">Energy</div>
                    <div class="entry-status" x-text="$store.manualEntryStatus.energy"></div>
                </div>
                <div class="entry-arrow">›</div>
            </div>

            <!-- Notes Entry -->
            <div class="manual-entry-card" @click="showManualEntry('notes')">
                <div class="entry-icon notes-icon">📝</div>
                <div class="entry-content">
                    <div class="entry-name">Notes</div>
                    <div class="entry-status" x-text="$store.manualEntryStatus.notes"></div>
                </div>
                <div class="entry-arrow">›</div>
            </div>
        </div>
    </div>

    <!-- Today's Insights -->
    <div class="insights-section">
        <div class="section-header">
            <h3>Today's Insights</h3>
        </div>
        
        <div 
            id="today-insights" 
            hx-get="/api/ui/today/insights"
            hx-trigger="load, every 300s"
            hx-swap="innerHTML"
        >
            <!-- Loading placeholder -->
            <div class="loading-card">
                <div class="loading-spinner"></div>
                <p>Generating insights...</p>
            </div>
        </div>
    </div>

</div>

<!-- CSS for Today View -->
<style>

    flex-direction: column;
    gap: var(--spacing-lg);
    max-width: 100%;
}

/* Sync Status Banner */
.sync-banner {
    background: var(--bg-primary);
    border-radius: var(--border-radius);
    padding: var(--spacing-md);
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-light);
    margin-bottom: var(--spacing-md);
}

.sync-info {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
}

.sync-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: var(--transition);
}

.sync-icon.online { background: var(--success-color); color: white; }
.sync-icon.syncing { background: var(--warning-color); color: white; animation: pulse 1.5s infinite; }
.sync-icon.offline { background: var(--text-secondary); color: white; }
.sync-icon.error { background: var(--danger-color); color: white; }

.sync-details {

}

.sync-text {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
}

.sync-time {

}

.sync-refresh-btn {

    height: var(--touch-target-min);
    border: none;
    background: var(--bg-secondary);
    border-radius: 50%;
    cursor: pointer;
    transition: var(--transition);
    font-size: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
}

.sync-refresh-btn:hover {

    color: var(--text-light);

    opacity: 0.5;

</style>

<!-- JavaScript for Today View -->
<script>
function syncBanner() {
    return {
        syncStatusClass: 'online',
        syncIcon: '✓',
        syncMessage: 'All data synchronized',
        lastSyncTime: 'Just now',
        isRefreshing: false,
        
        async checkSyncStatus() {
            try {
                const response = await fetch('/api/health');
                if (response.ok) {
                    this.syncStatusClass = 'online';
                    this.syncIcon = '✓';
                    this.syncMessage = 'All data synchronized';
                    this.updateLastSyncTime();
                } else {
                    throw new Error('API not responding');
                }
            } catch (error) {
                this.syncStatusClass = 'error';
                this.syncIcon = '⚠';
                this.syncMessage = 'Sync error';
                this.lastSyncTime = 'Connection failed';
            }
        },
        
        async refreshData() {
            if (this.isRefreshing) return;
            
            this.isRefreshing = true;
            this.syncStatusClass = 'syncing';
            this.syncIcon = '⟳';
            this.syncMessage = 'Refreshing data...';
            
            try {
                // Trigger HTMX refresh for all data sections
                htmx.trigger('#primary-metrics', 'load');
                htmx.trigger('#secondary-metrics', 'load');
                htmx.trigger('#today-insights', 'load');
                
                // Wait for refresh to complete
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                this.syncStatusClass = 'online';
                this.syncIcon = '✓';
                this.syncMessage = 'Data refreshed';
                this.updateLastSyncTime();
                
                // Show success notification
                window.dispatchEvent(new CustomEvent('show-success', {
                    detail: { message: 'Data refreshed successfully' }
                }));
                
            } catch (error) {
                this.syncStatusClass = 'error';
                this.syncIcon = '⚠';
                this.syncMessage = 'Refresh failed';
                
                window.dispatchEvent(new CustomEvent('show-error', {
                    detail: { message: 'Failed to refresh data' }
                }));
            } finally {
                this.isRefreshing = false;
            }
        },
        
        updateLastSyncTime() {
            const now = new Date();
            this.lastSyncTime = now.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit'
            });
            
            // Store for persistence
            localStorage.setItem('healthTracker_lastSync', now.toISOString());
        }
    };
}

// Initialize today stats
document.addEventListener('alpine:init', () => {
    Alpine.store('todayStats', {
        totalMetrics: 0,
        completedGoals: 0,
        streakDays: 0,
        healthScore: '--',
        
        async update() {
            try {
                const response = await fetch('/api/ui/today/stats');
                if (response.ok) {
                    const stats = await response.json();
                    Object.assign(this, stats);
                }
            } catch (error) {
                console.error('Failed to update today stats:', error);
            }
        }
    });
    
    // Update stats every 5 minutes
    setInterval(() => {
        Alpine.store('todayStats').update();
    }, 300000);
});

// Manual entry status tracking
document.addEventListener('alpine:init', () => {
    Alpine.store('manualEntryStatus', {
        hrv: 'Not entered today',
        mood: 'Not entered today', 
        energy: 'Not entered today',
        notes: 'No notes today',
        
        async update() {
            try {
                const response = await fetch('/api/ui/today/manual-status');
                if (response.ok) {
                    const status = await response.json();
                    Object.assign(this, status);
                }
            } catch (error) {
                console.error('Failed to update manual entry status:', error);
            }
        }
    });
});
</script>
