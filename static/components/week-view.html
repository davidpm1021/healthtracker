<script>
// Week view specific JavaScript
document.addEventListener('DOMContentLoaded', function() {
    // Initialize week view when component loads
    initializeWeekView();
});

function initializeWeekView() {
    // Load week summary stats
    loadWeekSummaryStats();
    
    // Load week insights
    loadWeekInsights();
    
    // Initialize chart refresh functionality
    window.refreshChart = function(chartType) {
        console.log(`Refreshing ${chartType} chart`);
        
        // Use chart-specific refresh methods
        switch(chartType) {
            case 'steps':
                if (window.StepsChart) {
                    window.StepsChart.refresh();
                }
                break;
            case 'weight':
                if (window.WeightChart) {
                    window.WeightChart.refresh();
                }
                break;
            case 'heart_rate':
                if (window.HeartRateChart) {
                    window.HeartRateChart.refresh();
                }
                break;
            case 'sleep':
                if (window.WeekCharts && window.WeekCharts.sleep) {
                    window.WeekCharts.sleep.update();
                }
                break;
            case 'hrv':
                if (window.HRVChart) {
                    window.HRVChart.refresh();
                }
                break;
            default:
                // Fallback to generic update
                if (window.WeekCharts && window.WeekCharts[chartType]) {
                    window.WeekCharts[chartType].update();
                }
        }
    };
}

async function loadWeekSummaryStats() {
    try {
        // This would call a dedicated API endpoint for week summary stats
        // For now, using placeholder data
        document.getElementById('week-steps-total').textContent = '67,842';
        document.getElementById('week-sleep-avg').textContent = '7.6h';
        document.getElementById('week-active-days').textContent = '6/7';
    } catch (error) {
        console.error('Error loading week summary stats:', error);
    }
}

async function loadWeekInsights() {
    try {
        const insightsContent = document.getElementById('week-insights-content');
        insightsContent.innerHTML = `
            <div class="insight-item">📈 Your step count increased by 12% compared to last week</div>
            <div class="insight-item">😴 Sleep consistency improved - 6 nights within target range</div>
            <div class="insight-item">❤️ Average heart rate shows good recovery pattern</div>
        `;
    } catch (error) {
        console.error('Error loading week insights:', error);
        document.getElementById('week-insights-content').innerHTML = 
            '<div class="insight-item">Unable to load insights right now</div>';
    }
}
</script>
