        <!-- Heart Rate Variability -->
        <div class="chart-container month-secondary-chart">
            <div class="chart-header">

                    <span class="chart-icon">❤️</span>
                    <span>Heart Rate Trends</span>

    <!-- Month Insights Section -->

<script>
// Month view specific JavaScript
document.addEventListener('DOMContentLoaded', function() {
    // Initialize month view when component loads
    initializeMonthView();
});

// Current month offset (0 = current month, -1 = previous month, etc.)
let currentMonthOffset = 0;

function initializeMonthView() {
    // Load month summary stats
    loadMonthSummaryStats();
    
    // Load month insights
    loadMonthInsights();
    
    // Update period display
    updatePeriodDisplay();
    
    // Initialize chart refresh functionality
    window.refreshMonthChart = function(chartType) {
        console.log(`Refreshing ${chartType} month chart`);
        
        // Use chart-specific refresh methods for month period
        switch(chartType) {
            case 'steps':
                if (window.StepsChart && window.StepsChart.refreshMonth) {
                    window.StepsChart.refreshMonth(getCurrentMonthPeriod());
                }
                break;
            case 'weight':
                if (window.WeightChart && window.WeightChart.refreshMonth) {
                    window.WeightChart.refreshMonth(getCurrentMonthPeriod());
                }
                break;
            case 'heart_rate':
                if (window.HeartRateChart && window.HeartRateChart.refreshMonth) {
                    window.HeartRateChart.refreshMonth(getCurrentMonthPeriod());
                }
                break;
            case 'sleep':
                if (window.SleepChart && window.SleepChart.refreshMonth) {
                    window.SleepChart.refreshMonth(getCurrentMonthPeriod());
                }
                break;
            default:
                console.warn(`Unknown chart type for month refresh: ${chartType}`);
        }
    };
    
    // Initialize month charts
    initializeMonthCharts();
}

function initializeMonthCharts() {
    console.log('Initializing month view charts...');
    
    // Initialize month-specific chart instances
    if (window.initializeStepsMonthChart) window.initializeStepsMonthChart();
    if (window.initializeSleepMonthChart) window.initializeSleepMonthChart();
    if (window.initializeWeightMonthChart) window.initializeWeightMonthChart();
    if (window.initializeHeartRateMonthChart) window.initializeHeartRateMonthChart();
}

function changeMonthPeriod(direction) {
    currentMonthOffset += direction;
    
    // Limit to reasonable range (don't go too far back or forward)
    if (currentMonthOffset < -12) currentMonthOffset = -12;
    if (currentMonthOffset > 0) currentMonthOffset = 0;
    
    updatePeriodDisplay();
    loadMonthSummaryStats();
    loadMonthInsights();
    
    // Refresh all charts with new period
    ['steps', 'sleep', 'weight', 'heart_rate'].forEach(chartType => {
        refreshMonthChart(chartType);
    });
}

function getCurrentMonthPeriod() {
    const now = new Date();
    const targetDate = new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1);
    
    return {
        year: targetDate.getFullYear(),
        month: targetDate.getMonth() + 1,
        monthName: targetDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }),
        offset: currentMonthOffset
    };
}

function updatePeriodDisplay() {
    const period = getCurrentMonthPeriod();
    const displayElement = document.getElementById('month-period-display');
    
    if (displayElement) {
        displayElement.textContent = period.monthName;
    }
    
    // Update navigation button states
    const prevBtn = document.querySelector('.period-btn:first-child');
    const nextBtn = document.querySelector('.period-btn:last-child');
    
    if (prevBtn) prevBtn.disabled = currentMonthOffset <= -12;
    if (nextBtn) nextBtn.disabled = currentMonthOffset >= 0;
}

async function loadMonthSummaryStats() {
    try {
        const period = getCurrentMonthPeriod();
        
        // This would call dedicated API endpoints for month summary stats
        // For now, using placeholder data based on current month
        const isCurrentMonth = currentMonthOffset === 0;
        
        document.getElementById('month-steps-total').textContent = isCurrentMonth ? '289,420' : '245,680';
        document.getElementById('month-sleep-avg').textContent = isCurrentMonth ? '7.4h' : '7.2h';
        document.getElementById('month-active-days').textContent = isCurrentMonth ? '18/23' : '26/31';
        document.getElementById('month-goals-met').textContent = isCurrentMonth ? '67%' : '74%';
        
    } catch (error) {
        console.error('Error loading month summary stats:', error);
    }
}

async function loadMonthInsights() {
    try {
        const period = getCurrentMonthPeriod();
        const insightsContent = document.getElementById('month-insights-content');
        
        // Generate month-specific insights
        const insights = generateMonthInsights(period);
        
        insightsContent.innerHTML = insights.map(insight => 
            `<div class="insight-item">${insight}</div>`
        ).join('');
        
    } catch (error) {
        console.error('Error loading month insights:', error);
        document.getElementById('month-insights-content').innerHTML = 
            '<div class="insight-item">Unable to load monthly insights right now</div>';
    }
}

function generateMonthInsights(period) {
    const isCurrentMonth = period.offset === 0;
    
    if (isCurrentMonth) {
        return [
            `📈 You're averaging 12,580 steps per day this month (+8% vs last month)`,
            `😴 Sleep consistency improved with 78% of nights in your target range`,
            `🎯 On track to meet 3 out of 4 monthly goals - keep up the momentum!`,
            `💪 Best week was Week 2 with 15,200 average daily steps`
        ];
    } else {
        const monthName = period.monthName.split(' ')[0];
        return [
            `📊 ${monthName} summary: 245,680 total steps across 31 days`,
            `🏆 Achieved step goal on 23 days (74% success rate)`,
            `😴 Average sleep duration was 7.2 hours with 68% consistency`,
            `📈 Showed steady improvement in the second half of the month`
        ];
    }
}
</script>
